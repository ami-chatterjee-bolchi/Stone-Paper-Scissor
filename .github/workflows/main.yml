name: Flutter Build APK

# This triggers the build every time you "push" code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from your repo
      - uses: actions/checkout@v4

      # 2. Set up Java (required for Android builds)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # Uses the latest stable 3.x version
          channel: 'stable'

      # 4. Get Flutter dependencies
      - name: Install dependencies
        run: flutter pub get

     # 5. Build the APK and rename it
      - name: Build APK
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/stone_paper_scissor.apk

      # 6. Upload the renamed APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-build # This is the name of the ZIP folder
          path: build/app/outputs/flutter-apk/stone_paper_scissor.apk
